# ─── LOCAL profile ───────────────────────────────────────────────
# Datasource (H2) is configured in application.yml so the app starts
# even if no profile is explicitly passed.  This profile adds the H2
# console, debug logging, and the seed-data Flyway location.
spring:
  h2:
    console:
      enabled: true          # http://localhost:8080/h2-console
      path: /h2-console

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    locations: classpath:db/migration,classpath:db/seed   # seed data only for local

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8080
