spring:
  application:
    name: order-service

  # Active profile is set via --spring.profiles.active=local|stage
  profiles:
    active: local

  # Default datasource: H2 in-memory (overridden by application-stage.yml for PostgreSQL)
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    open-in-view: false          # avoid lazy-load anti-pattern across HTTP layer
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "OrderServiceSuperSecretKeyForJWT_MustBe256BitsOrMore_2024"
    expiration-ms: 300      # 5 minutes

  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 500
    thread-name-prefix: "order-async-"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
